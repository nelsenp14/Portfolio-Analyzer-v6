function cleanTicker(t) { return (t || "").replace(/-\d+$/, "").toUpperCase().trim(); }
function fmt(v) { return "$" + v.toLocaleString("en-US"); }
function useWidth() {
  var [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 1200);
  useEffect(function() { function h() { setW(window.innerWidth); } window.addEventListener("resize", h); return function() { window.removeEventListener("resize", h); }; }, []);
  return w;
}

async function callAI(messages, system, mode) {
  var r = await fetch(API, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ messages: messages, system: system, mode: mode || "fast" }) });
  if (!r.ok) { var e = await r.json(); throw new Error(e.error || "API " + r.status); }
  var d = await r.json();
  return (d.content || []).filter(function(b) { return b.type === "text"; }).map(function(b) { return b.text; }).join("") || "";
}

function parseJ(raw) {
  var c = raw.replace(/```json|```/g, "").trim();
  var a = c.indexOf("["), b = c.lastIndexOf("]"), a2 = c.indexOf("{"), b2 = c.lastIndexOf("}");
  if (a > -1 && b > a) return JSON.parse(c.slice(a, b + 1));
  if (a2 > -1 && b2 > a2) return JSON.parse(c.slice(a2, b2 + 1));
  throw new Error("No JSON");
}

  </g>;
}
function renderLabel(props) {
  if (parseFloat(props.pct) < 4) return null;
  var RADIAN = Math.PI / 180;
  var radius = props.outerRadius + 22;
  var x = props.cx + radius * Math.cos(-props.midAngle * RADIAN);
  var y = props.cy + radius * Math.sin(-props.midAngle * RADIAN);
  return <text x={x} y={y} textAnchor={x > props.cx ? "start" : "end"} dominantBaseline="central" style={{ fontSize: 10, fill: "#cbd5e1", fontFamily: "'Poppins',sans-serif", fontWeight: 500, transition: "all 0.3s ease" }}>{props.name} {props.pct}%</text>;
}
function PTip(props) {

}

}

function storageSave(key, data) { try { localStorage.setItem(key, JSON.stringify(data)); return true; } catch (e) { return false; } }
function storageLoad(key) { try { var r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch (e) { return null; } }

  const [calcMonthly, setCalcMonthly] = useState("500");

  const [saveName, setSaveName] = useState("");

  const [activeT, setActiveT] = useState(null);

  useEffect(function() {
    if (loaded.current) return; loaded.current = true;

    if (keys && keys.length) { var items = keys.map(function(k) { var d = storageLoad(k); return d ? Object.assign({}, d, { key: k }) : null; }).filter(Boolean).sort(function(a, b) { return (b.savedAt || 0) - (a.savedAt || 0); }); setSavedList(items); }
    var active = storageLoad("pf-active");
    if (active && active.holdings && active.holdings.length > 0) { setHoldings(active.holdings); nid.current = Math.max.apply(null, active.holdings.map(function(h) { return h.id; })) + 1; }
  }, []);
  useEffect(function() { if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: "smooth" }); }, [chatMsgs]);
  useEffect(function() { if (loaded.current) storageSave("pf-active", { holdings: holdings }); }, [holdings]);

  var validH = holdings.filter(function(h) { return h.ticker.trim() && parseFloat(h.shares) > 0 && parseFloat(h.avgCost) > 0; });
  var computed = useMemo(function() {
    var tvv = 0, tcc = 0, dii = 0;
    var poss = validH.map(function(h) { var tk = cleanTicker(h.ticker), e = enriched[tk] || {}; var price = e.currentPrice || parseFloat(h.avgCost), shares = parseFloat(h.shares), ac = parseFloat(h.avgCost); var v = price * shares, cost = ac * shares, div = (e.annualDividendPerShare || 0) * shares; tvv += v; tcc += cost; dii += div; return Object.assign({}, h, e, { ticker: tk, price: price, shares: shares, avgCost: ac, value: v, cost: cost }); });
    return { pos: poss, tv: tvv, tc: tcc, di: dii, dy: tvv > 0 ? (dii / tvv) * 100 : 0 };
  }, [validH, enriched]);
  var pos = computed.pos, tv = computed.tv, tc = computed.tc, dy = computed.dy;

  }, [pos, tv]);

  var scLabel = sc ? (sc.total < 20 ? "CONSERVATIVE" : sc.total < 35 ? "MOD-CONSERVATIVE" : sc.total < 50 ? "MODERATE" : sc.total < 65 ? "AGGRESSIVE" : "SPECULATIVE") : "";
  var hasData = Object.keys(enriched).length > 0;
  var isBusy = loading.fetch || loading.live;

  var pieDataT = pos.map(function(p, i) { return { name: p.ticker, value: Math.round(p.value), pct: tv ? ((p.value / tv) * 100).toFixed(1) : "0", color: CLR[i % CLR.length] }; }).sort(function(a, b) { return b.value - a.value; });
  var pieDataS = useMemo(function() { var m = {}; pos.forEach(function(p) { var s = p.sector || "Uncategorized"; m[s] = (m[s] || 0) + p.value; }); return Object.entries(m).map(function(e, i) { return { name: e[0], value: Math.round(e[1]), pct: tv ? ((e[1] / tv) * 100).toFixed(1) : "0", color: CLR[i % CLR.length] }; }).sort(function(a, b) { return b.value - a.value; }); }, [pos, tv]);
  var filteredHoldings = holdings.filter(function(h) { if (!filterTicker && !filterSector) return true; var tk = cleanTicker(h.ticker), e = enriched[tk] || {}; if (filterTicker) return tk === filterTicker; if (filterSector) return (e.sector || "Uncategorized") === filterSector; return true; });

  var startVal = tv > 0 ? tv : validH.reduce(function(s, h) { return s + (parseFloat(h.shares) || 0) * (parseFloat(h.avgCost) || 0); }, 0);
  var cA = parseFloat(calcReturn) || 0, cM = parseFloat(calcMonthly) || 0, cY = parseInt(calcYears) || 5;
  var proj = useMemo(function() {
    if (startVal <= 0) return null; var mr = Math.pow(1 + cA / 100, 1 / 12) - 1, months = cY * 12, showM = cY < 4;
    var data = [{ month: 0, label: "Now", portfolio: Math.round(startVal), contributed: Math.round(startVal), gains: 0 }];
    var pv = startVal, cum = startVal;

  // Risk insights computed
  var riskInsights = useMemo(function() {
    if (!sc || !pos.length) return [];
    var insights = [];

    if (sc.wb > 1.3) insights.push({ type: "warning", title: "High Market Sensitivity", text: "Portfolio beta of " + sc.wb.toFixed(2) + " means your portfolio amplifies market moves by " + ((sc.wb - 1) * 100).toFixed(0) + "%. A 10% market drop could mean a ~" + (sc.wb * 10).toFixed(0) + "% portfolio decline." });
    else if (sc.wb < 0.8) insights.push({ type: "good", title: "Defensive Positioning", text: "Portfolio beta of " + sc.wb.toFixed(2) + " provides cushion against market downturns. Your portfolio moves less than the overall market." });

              {[{ l: "Starting", v: fmt(Math.round(startVal)), c: "#fff" }, { l: cY + "yr Value", v: fmt(proj.final.portfolio), c: "#22c55e" }, { l: "Contributed", v: fmt(proj.final.contributed), c: "#3b82f6" }, { l: "Gains", v: fmt(proj.final.gains), c: "#a78bfa" }, { l: "Growth", v: "+" + ((proj.final.portfolio / startVal - 1) * 100).toFixed(0) + "%", c: "#f59e0b" }].map(function(m) { return <div key={m.l} style={cd}><div style={lbl}>{m.l}</div><div style={vlS(m.c)}>{m.v}</div></div>; })}
            </div>
            <div style={Object.assign({}, cd, { marginBottom: 14 })}><div style={ttl}>Projected Growth</div><div style={{ height: mob ? 240 : 320, marginTop: 16 }}><ResponsiveContainer width="100%" height="100%"><AreaChart data={proj.data.filter(function(d, i) { return i === 0 || i === proj.data.length - 1 || (proj.showM ? d.month % 3 === 0 : d.month % 12 === 0); })}>
              <defs><linearGradient id="gP" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#22c55e" stopOpacity={0.3} /><stop offset="100%" stopColor="#22c55e" stopOpacity={0} /></linearGradient><linearGradient id="gC" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#3b82f6" stopOpacity={0.2} /><stop offset="100%" stopColor="#3b82f6" stopOpacity={0} /></linearGradient></defs>
              <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
              <XAxis dataKey="label" tick={{ fill: "#64748b", fontSize: 9 }} interval="preserveStartEnd" />
              <YAxis tick={{ fill: "#64748b", fontSize: 9 }} tickFormatter={function(v) { return v >= 1e6 ? "$" + (v / 1e6).toFixed(1) + "M" : "$" + (v / 1e3).toFixed(0) + "k"; }} />
              <Tooltip content={<ChartTip />} />
              <Area type="monotone" dataKey="contributed" stroke="#3b82f6" fill="url(#gC)" strokeWidth={2} name="Contributed" />
              <Area type="monotone" dataKey="portfolio" stroke="#22c55e" fill="url(#gP)" strokeWidth={2} name="Portfolio" />
            </AreaChart></ResponsiveContainer></div></div>
            <div style={cd}><div style={ttl}>Year-by-Year</div><table style={{ width: "100%", borderCollapse: "collapse", marginTop: 12 }}><thead><tr>{["Year", "Portfolio", "Contributed", "Gains", "Year's Gain"].map(function(h) { return <th key={h} style={thd}>{h}</th>; })}</tr></thead><tbody>{proj.data.filter(function(d) { return d.month > 0 && d.month % 12 === 0; }).map(function(d, i, arr) { var pg = i > 0 ? arr[i - 1].gains : 0; return <tr key={i}><td style={Object.assign({}, tdd, { color: "#fff", fontWeight: 600 })}>Year {d.month / 12}</td><td style={Object.assign({}, tdd, { color: "#22c55e", fontWeight: 600 })}>{fmt(d.portfolio)}</td><td style={Object.assign({}, tdd, { color: "#3b82f6" })}>{fmt(d.contributed)}</td><td style={Object.assign({}, tdd, { color: "#a78bfa" })}>{fmt(d.gains)}</td><td style={Object.assign({}, tdd, { color: "#22c55e" })}>+{fmt(d.gains - pg)}</td></tr>; })}</tbody></table></div>
          </div>}
        </div>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
